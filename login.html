<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Login to GreenHarvest Customer Dashboard. Manage your organic farm subscriptions and orders.">
    <title>Login | GreenHarvest CSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
            background-color: #2E7D32;
        }

        .auth-wrapper {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Centered card */
        .auth-form-panel {
            width: 100%;
            max-width: 440px;
        }

        .auth-form-box {
            background: var(--bg-body);
            border-radius: 20px;
            padding: 2rem 2.25rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
        }

        /* Logo centered at top of card */
        .auth-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .auth-logo img {
            height: var(--logo-height);
            width: auto;
        }

        .auth-form-box h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.2rem;
            text-align: center;
        }

        .auth-form-box .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-bottom: 1.25rem;
            text-align: center;
        }

        /* Social buttons */
        .social-login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 0.65rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1.5px solid var(--border-color);
            background: var(--bg-body);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .social-login-btn:hover {
            background: var(--bg-alt);
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }

        .social-login-btn .social-icon {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .social-login-btn.google-btn .social-icon {
            color: #ea4335;
        }

        .social-login-btn.facebook-btn .social-icon {
            color: #1877f2;
        }

        /* Divider */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 1rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .auth-form-box .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.35rem;
        }

        .auth-form-box .form-control {
            background: var(--bg-alt);
            border: 1.5px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            font-size: 0.9rem;
        }

        .auth-form-box .form-control:focus {
            background: var(--bg-alt);
            border-color: var(--primary);
            color: var(--text-main);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.15);
        }

        .auth-form-box .form-control::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        [data-theme="dark"] .auth-form-box .form-control {
            background: #2c2c2c !important;
            border-color: #444 !important;
            color: #f8f9fa !important;
        }

        [data-theme="dark"] .social-login-btn {
            background: #1e1e1e;
            border-color: #444;
            color: #f8f9fa;
        }

        [data-theme="dark"] .social-login-btn:hover {
            background: #2c2c2c;
        }

        /* Theme toggle */
        .auth-theme-toggle {
            position: absolute;
            top: 1.25rem;
            right: 1.5rem;
            z-index: 1060;
        }

        .auth-theme-toggle .theme-toggle-btn,
        .auth-theme-toggle .rtl-toggle-btn {
            color: #ffffff;
        }

        .auth-theme-toggle .theme-toggle-btn:hover,
        .auth-theme-toggle .rtl-toggle-btn:hover {
            color: #000;
        }

        @media (max-width: 768px) {
            .auth-theme-toggle {
                top: 1rem;
                right: 1rem;
            }

            .auth-brand-panel {
                display: none;
            }

            .auth-form-panel {
                padding: 3rem 1rem 1rem;
            }

            body,
            html {
                height: auto;
                overflow: auto;
            }

            .auth-wrapper {
                height: auto;
                min-height: 100vh;
                padding: 4rem 1rem 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Theme Toggle -->
    <div class="auth-theme-toggle">
        <button id="theme-toggle-btn" class="theme-toggle-btn" aria-label="Toggle Theme">
            <i class="bi bi-sun-fill"></i>
            <i class="bi bi-moon-stars-fill"></i>
        </button>
        <button class="rtl-toggle-btn" aria-label="Toggle RTL">RTL</button>
    </div>

    <div class="auth-wrapper position-relative overflow-hidden">
        <!-- Background Decorations -->
        <div class="bg-decoration pos-1 float-leaf" style="color: #fff; opacity: 0.15; z-index: 0;">
            <svg class="decoration-leaf" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z" />
            </svg>
        </div>
        <div class="bg-decoration pos-4 float-leaf"
            style="color: #fff; opacity: 0.15; z-index: 0; transform: rotate(180deg);">
            <svg class="decoration-leaf" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z" />
            </svg>
        </div>

        <!-- Centered Form Card -->
        <div class="auth-form-panel" style="z-index: 2;">
            <div class="auth-form-box">

                <!-- Logo centered inside form -->
                <div class="auth-logo">
                    <a href="index.html">
                        <img src="assets/images/logo-dark.svg" alt="GreenHarvest Logo" class="brand-logo logo-on-light">
                        <img src="assets/images/logo-light.svg" alt="GreenHarvest Logo" class="brand-logo logo-on-dark">
                    </a>
                </div>

                <h2>Welcome Back</h2>


                <!-- Login Form -->
                <form class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label class="form-label" for="loginEmail">Email Address</label>
                        <input id="loginEmail" type="email" class="form-control" placeholder="name@email.com" required>
                        <div class="invalid-feedback">Please enter a valid email address.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="loginPassword">Password</label>
                        <input id="loginPassword" type="password" class="form-control" placeholder="••••••••" required>
                        <div class="invalid-feedback">Please enter your password.</div>
                    </div>

                    <!-- Remember me + Forgot password on same line -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check mb-0">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label small" for="remember">Remember me</label>
                        </div>
                        <a href="#" class="small text-primary fw-bold text-decoration-none">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">Login to Dashboard</button>

                    <div class="auth-divider">or continue with</div>

                    <!-- Social Login - Same Line -->
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <button type="button" class="social-login-btn google-btn">
                                <span class="social-icon"><i class="bi bi-google"></i></span>
                                Google
                            </button>
                        </div>
                        <div class="col-6">
                            <button type="button" class="social-login-btn facebook-btn">
                                <span class="social-icon"><i class="bi bi-facebook"></i></span>
                                Facebook
                            </button>
                        </div>
                    </div>

                    <p class="auth-subtitle mt-4 mb-0">New here? <a href="register.html"
                            class="fw-bold text-primary">Create an account</a></p>
                </form>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
