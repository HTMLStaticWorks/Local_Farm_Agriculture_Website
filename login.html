<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login | GreenHarvest CSA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            background-color: #2E7D32;
        }

        .auth-wrapper {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Centered card */
        .auth-form-panel {
            width: 100%;
            max-width: 440px;
        }

        .auth-form-box {
            background: var(--bg-body);
            border-radius: 20px;
            padding: 2rem 2.25rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
        }

        /* Logo centered at top of card */
        .auth-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .auth-logo img { height: 46px; width: auto; }

        .auth-form-box h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.2rem;
            text-align: center;
        }

        .auth-form-box .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-bottom: 1.25rem;
            text-align: center;
        }

        /* Social buttons */
        .social-login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 0.65rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1.5px solid var(--border-color);
            background: var(--bg-body);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .social-login-btn:hover {
            background: var(--bg-alt);
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }

        .social-login-btn .social-icon {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .social-login-btn.google-btn .social-icon { color: #ea4335; }
        .social-login-btn.facebook-btn .social-icon { color: #1877f2; }

        /* Divider */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 1rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .auth-form-box .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.35rem;
        }

        .auth-form-box .form-control {
            background: var(--bg-alt);
            border: 1.5px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            font-size: 0.9rem;
        }

        .auth-form-box .form-control:focus {
            background: var(--bg-alt);
            border-color: var(--primary);
            color: var(--text-main);
            box-shadow: 0 0 0 3px rgba(46,125,50,0.15);
        }

        .auth-form-box .form-control::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        [data-theme="dark"] .auth-form-box .form-control {
            background: #2c2c2c !important;
            border-color: #444 !important;
            color: #f8f9fa !important;
        }

        [data-theme="dark"] .social-login-btn {
            background: #1e1e1e;
            border-color: #444;
            color: #f8f9fa;
        }

        [data-theme="dark"] .social-login-btn:hover {
            background: #2c2c2c;
        }

        /* Theme toggle */
        .auth-theme-toggle {
            position: fixed;
            top: 1.25rem;
            right: 1.5rem;
            z-index: 1060;
        }

        @media (max-width: 768px) {
            .auth-brand-panel { display: none; }
            .auth-form-panel { padding: 2rem 1.5rem; }
            body, html { overflow: auto; }
        }
    </style>
</head>

<body>

    <!-- Theme Toggle -->
    <div class="auth-theme-toggle">
        <button id="theme-toggle-btn" class="theme-toggle-btn" aria-label="Toggle Theme">
            <i class="bi bi-sun-fill"></i>
            <i class="bi bi-moon-stars-fill"></i>
        </button>
    </div>

    <div class="auth-wrapper">

        <!-- Centered Form Card -->
        <div class="auth-form-panel">
            <div class="auth-form-box">

                <!-- Logo centered inside form -->
                <div class="auth-logo">
                    <a href="index.html">
                        <img src="assets/images/logo-dark.svg" alt="GreenHarvest Logo" class="logo-on-light">
                        <img src="assets/images/logo-light.svg" alt="GreenHarvest Logo" class="logo-on-dark">
                    </a>
                </div>

                <h2>Sign In</h2>
                <p class="auth-subtitle">New here? <a href="register.html" class="fw-bold text-primary">Create an account</a></p>

                <!-- Social Login -->
                <div class="d-flex gap-2 mb-2">
                    <button class="social-login-btn google-btn">
                        <span class="social-icon"><i class="bi bi-google"></i></span>
                        Continue with Google
                    </button>
                </div>
                <div class="d-flex gap-2 mb-1">
                    <button class="social-login-btn facebook-btn">
                        <span class="social-icon"><i class="bi bi-facebook"></i></span>
                        Continue with Facebook
                    </button>
                </div>

                <div class="auth-divider">or continue with email</div>

                <!-- Login Form -->
                <form class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label class="form-label" for="loginEmail">Email Address</label>
                        <input id="loginEmail" type="email" class="form-control" placeholder="name@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="loginPassword">Password</label>
                        <input id="loginPassword" type="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <!-- Remember me + Forgot password on same line -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check mb-0">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label small" for="remember">Remember me</label>
                        </div>
                        <a href="#" class="small text-primary fw-semibold">Forgot password?</a>
                    </div>

                    <a href="dashboard.html" class="btn btn-primary w-100 py-2 fw-bold">Login to Dashboard</a>
                </form>

            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
